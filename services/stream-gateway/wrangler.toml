name = "integratewise-stream-gateway"
main = "src/index.ts"
compatibility_date = "2024-06-10"
compatibility_flags = ["nodejs_compat"]

# ─── Secrets (managed by Doppler → synced via scripts/sync-doppler-to-workers.sh) ───
# Doppler config: {env}_stream-gateway  (e.g. prd_stream-gateway)
#
# Required secrets:
#   SUPABASE_URL          - Supabase project URL (for auth verification)
#   SUPABASE_SERVICE_KEY  - Supabase service-role key
#   JWT_SECRET            - JWT secret for WebSocket auth tokens

# =============================================================================
# Durable Objects for Real-time Connections
# =============================================================================
[durable_objects]
bindings = [
  { name = "SIGNAL_STREAM", class_name = "SignalStreamDO" },
  { name = "PRESENCE", class_name = "PresenceDO" },
  { name = "ROOM", class_name = "RoomDO" }
]

[[migrations]]
tag = "v1"
new_classes = ["SignalStreamDO", "PresenceDO", "RoomDO"]

# =============================================================================
# KV for connection metadata and rate limiting
# =============================================================================
[[kv_namespaces]]
binding = "CONNECTION_META"
id = "39608aa63c5340bf953575dec34416ed"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "8f61d841d2574061ac1d547187d72a58"

# =============================================================================
# Service Bindings
# =============================================================================
[[services]]
binding = "THINK"
service = "integratewise-think"

[[services]]
binding = "TENANTS"
service = "integratewise-tenants"

[[services]]
binding = "IQ_HUB"
service = "integratewise-iq-hub"

# BFF composite views need Pipeline + Knowledge + Govern
[[services]]
binding = "PIPELINE"
service = "integratewise-spine-v2"

[[services]]
binding = "KNOWLEDGE"
service = "integratewise-knowledge"

[[services]]
binding = "GOVERN"
service = "integratewise-govern"

# =============================================================================
# Queue Producer (v3.6 Section 19.7 — HITL approvals for Act mode)
# =============================================================================
[[queues.producers]]
binding = "ACT_QUEUE"
queue = "integratewise-intelligence-act"

# =============================================================================
# Environment Variables
# =============================================================================
[vars]
ENVIRONMENT = "development"
LOG_LEVEL = "debug"
MAX_CONNECTIONS_PER_TENANT = "1000"
MAX_CONNECTIONS_PER_USER = "10"
HEARTBEAT_INTERVAL_MS = "30000"
CONNECTION_TIMEOUT_MS = "300000"

# =============================================================================
# Staging Environment
# =============================================================================
[env.staging]
name = "integratewise-stream-gateway-staging"
[env.staging.vars]
ENVIRONMENT = "staging"
LOG_LEVEL = "info"
[[env.staging.kv_namespaces]]
binding = "CONNECTION_META"
id = "39608aa63c5340bf953575dec34416ed"
[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT"
id = "8f61d841d2574061ac1d547187d72a58"

# =============================================================================
# Production Environment
# =============================================================================
[env.production]
name = "integratewise-stream-gateway-production"
routes = [
  { pattern = "stream.integratewise.ai/*", zone_name = "integratewise.ai" }
]
[env.production.vars]
ENVIRONMENT = "production"
LOG_LEVEL = "warn"
MAX_CONNECTIONS_PER_TENANT = "10000"
MAX_CONNECTIONS_PER_USER = "50"
[[env.production.kv_namespaces]]
binding = "CONNECTION_META"
id = "39608aa63c5340bf953575dec34416ed"
[[env.production.kv_namespaces]]
binding = "RATE_LIMIT"
id = "8f61d841d2574061ac1d547187d72a58"
