name = "integratewise-admin"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ─── Secrets (managed by Doppler → synced via scripts/sync-doppler-to-workers.sh) ───
# Doppler config: {env}_admin  (e.g. prd_admin)
#
# Required secrets:
#   JWT_SECRET            - Supabase JWT secret (for admin role verification)

[dev]
port = 8015
local_protocol = "http"

# =============================================================================
# D1 Database (newsletter, contact, support, audit)
# =============================================================================
[[d1_databases]]
binding = "DB"
database_name = "integratewise-spine-prod"
database_id = "08d9f306-0f89-435a-8141-45097e3a0769"

# =============================================================================
# Environment Variables
# =============================================================================
[vars]
ENVIRONMENT = "development"

# =============================================================================
# Observability & Monitoring
# =============================================================================
[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1

# =============================================================================
# Staging Environment
# =============================================================================
[env.staging]
name = "integratewise-admin-staging"
routes = [
  { pattern = "admin-staging.integratewise.ai/*", zone_name = "integratewise.ai" }
]
[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "integratewise-spine-staging"
database_id = "6a8b5b3c-18c7-4d0e-aa10-20d0b71a1abc"

# =============================================================================
# Production Environment
# =============================================================================
[env.production]
name = "integratewise-admin"
routes = [
  { pattern = "admin.integratewise.ai/*", zone_name = "integratewise.ai" }
]
[env.production.vars]
ENVIRONMENT = "production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "integratewise-spine-prod"
database_id = "08d9f306-0f89-435a-8141-45097e3a0769"
