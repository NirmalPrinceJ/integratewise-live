name = "integratewise-gateway"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Service bindings — Gateway routes to ALL downstream services
[[services]]
binding = "LOADER"
service = "integratewise-loader"

[[services]]
binding = "NORMALIZER"
service = "integratewise-normalizer"

[[services]]
binding = "THINK"
service = "integratewise-think"

[[services]]
binding = "KNOWLEDGE"
service = "integratewise-knowledge"

[[services]]
binding = "WORKFLOW"
service = "integratewise-workflow"

[[services]]
binding = "ADMIN"
service = "integratewise-admin"

[[services]]
binding = "BILLING"
service = "integratewise-billing"

[[services]]
binding = "TENANTS"
service = "integratewise-tenants"

[[services]]
binding = "ACT"
service = "integratewise-act"

[[services]]
binding = "GOVERN"
service = "integratewise-govern"

# Queue producer — inbound webhook/connector data → pipeline
[[queues.producers]]
queue = "connector.inbound"
binding = "CONNECTOR_QUEUE"

# KV for rate limiting + session cache
[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "placeholder-rate-limits"

[[kv_namespaces]]
binding = "SESSIONS"
id = "placeholder-sessions"

[env.staging]
name = "integratewise-gateway-staging"

[env.production]
name = "integratewise-gateway"
