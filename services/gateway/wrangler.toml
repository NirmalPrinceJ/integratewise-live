name = "integratewise-gateway"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Service bindings — v3.6 consolidated model (5 external Workers)
# Admin, billing, tenants are now internal to this Gateway Worker
[[services]]
binding = "CONNECTOR"
service = "integratewise-connector"

[[services]]
binding = "PIPELINE"
service = "integratewise-pipeline"

[[services]]
binding = "INTELLIGENCE"
service = "integratewise-intelligence"

[[services]]
binding = "KNOWLEDGE"
service = "integratewise-knowledge"

[[services]]
binding = "BFF"
service = "integratewise-bff"

# Queue producer — inbound webhook/connector data → pipeline
[[queues.producers]]
queue = "connector.inbound"
binding = "CONNECTOR_QUEUE"

# KV for rate limiting + session cache
[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "8f61d841d2574061ac1d547187d72a58"

[[kv_namespaces]]
binding = "SESSIONS"
id = "508ba759f7a44ca8aaaf8502d603077b"

[env.staging]
name = "integratewise-gateway-staging"

[env.production]
name = "integratewise-gateway"
