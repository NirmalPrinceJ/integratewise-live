name = "integratewise-loader"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ─── Secrets (managed by Doppler → synced via scripts/sync-doppler-to-workers.sh) ───
# Doppler config: {env}_loader  (e.g. prd_loader)

[dev]
port = 8006
local_protocol = "http"

# =============================================================================
# Service Bindings (Worker-to-Worker, zero-latency)
# Pipeline: LOADER ingests → NORMALIZER normalizes → STORE persists
# =============================================================================
[[services]]
binding = "NORMALIZER"
service = "integratewise-normalizer"

[[services]]
binding = "STORE"
service = "integratewise-store"

[[services]]
binding = "KNOWLEDGE"
service = "integratewise-knowledge"

# =============================================================================
# Durable Objects (MCP Session Management)
# =============================================================================
[[durable_objects.bindings]]
name = "MCP_SESSION"
class_name = "McpSessionDO"

[[migrations]]
tag = "v1"
new_classes = ["McpSessionDO"]

# =============================================================================
# D1 Database
# =============================================================================
[[d1_databases]]
binding = "DB"
database_name = "integratewise-spine-prod"
database_id = "08d9f306-0f89-435a-8141-45097e3a0769"

# =============================================================================
# R2 Storage (raw file intake)
# =============================================================================
[[r2_buckets]]
binding = "FILES"
bucket_name = "integratewise-files-prod"

# =============================================================================
# Queue Producer (v3.6 Section 19.7 — 8-stage pipeline processing)
# =============================================================================
[[queues.producers]]
binding = "PIPELINE_QUEUE"
queue = "integratewise-pipeline-process"

# =============================================================================
# Environment Variables
# =============================================================================
[vars]
ENVIRONMENT = "development"

# =============================================================================
# Observability & Monitoring
# =============================================================================
[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1

# =============================================================================
# Staging Environment
# =============================================================================
[env.staging]
name = "integratewise-loader-staging"
routes = [
  { pattern = "loader-staging.integratewise.ai/*", zone_name = "integratewise.ai" }
]
[env.staging.vars]
ENVIRONMENT = "staging"

# =============================================================================
# Production Environment
# =============================================================================
[env.production]
name = "integratewise-loader"
routes = [
  { pattern = "loader.integratewise.ai/*", zone_name = "integratewise.ai" }
]
[env.production.vars]
ENVIRONMENT = "production"
