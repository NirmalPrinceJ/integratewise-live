name = "integratewise-loader"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Produces to pipeline queue
[[queues.producers]]
queue = "pipeline.process"
binding = "PIPELINE_QUEUE"

# KV for idempotency checks
[[kv_namespaces]]
binding = "MCP_IDEMPOTENCY"
id = "placeholder-mcp-idempotency"

# D1 for connector cursors + dedup
[[d1_databases]]
binding = "EDGE_DB"
database_name = "integratewise-spine-cache"
database_id = "placeholder-d1-id"

# Cron trigger for polling connectors
[triggers]
crons = ["*/5 * * * *"]

[env.staging]
name = "integratewise-loader-staging"
