name = "integratewise-bff"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# HITL approvals → act queue
[[queues.producers]]
queue = "intelligence.act"
binding = "ACT_QUEUE"

# Service bindings for view aggregation (v3.6 consolidated names)
[[services]]
binding = "SPINE"
service = "integratewise-pipeline"

[[services]]
binding = "KNOWLEDGE"
service = "integratewise-knowledge"

[[services]]
binding = "THINK"
service = "integratewise-intelligence"

[[services]]
binding = "ACT"
service = "integratewise-act"

# Durable Objects for real-time streaming (Hot Memory)
[durable_objects]
bindings = [
  { name = "HITL_GATE", class_name = "HITLGate" }
]

[[migrations]]
tag = "v1-hitl-gate"
new_classes = ["HITLGate"]

[env.staging]
name = "integratewise-bff-staging"
