# Consolidated Intelligence Worker (v3.6 Architecture)
# Merges: think + act + govern + agents
name = "integratewise-intelligence"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# --- Queue Consumers ---

# From think: intelligence events from pipeline
[[queues.consumers]]
queue = "intelligence.events"
max_batch_size = 10
max_batch_timeout = 30

# From act: approved actions
[[queues.consumers]]
queue = "intelligence.act"
max_batch_size = 10
max_batch_timeout = 30

# From govern: DLQ for governance review
[[queues.consumers]]
queue = "ops.dlq"
max_batch_size = 10
max_batch_timeout = 30

[[queues.consumers]]
queue = "signals"
max_batch_size = 10
max_batch_timeout = 30

# --- Queue Producers ---

# From act: pipeline re-ingestion after write-back
[[queues.producers]]
queue = "pipeline.process"
binding = "PIPELINE_QUEUE"

# --- Service Bindings (external only) ---

# Act needs connector for tool write-back (→ integratewise-connector)
[[services]]
binding = "CONNECTOR"
service = "integratewise-connector"

[[services]]
binding = "WORKFLOW"
service = "integratewise-bff"

[[services]]
binding = "ACT"
service = "integratewise-act"

[[d1_databases]]
binding = "D1"
database_name = "integratewise-spine-cache"
database_id = "placeholder-d1-id"

[vars]
ENABLE_SIGNALS = "true"
SERVICE_SECRET = "replace-in-production"

[env.staging]
name = "integratewise-intelligence-staging"

[env.production]
name = "integratewise-intelligence"
