name = "integratewise-normalizer"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ─── Secrets (managed by Doppler → synced via scripts/sync-doppler-to-workers.sh) ───
# Doppler config: {env}_normalizer  (e.g. prd_normalizer)

[dev]
port = 8005
local_protocol = "http"

# =============================================================================
# Service Bindings (Worker-to-Worker, zero-latency)
# Pipeline: NORMALIZER normalizes data, stores via PIPELINE (Spine) + KNOWLEDGE
# =============================================================================
[[services]]
binding = "PIPELINE"
service = "integratewise-spine-v2"

[[services]]
binding = "KNOWLEDGE"
service = "integratewise-knowledge"

# =============================================================================
# R2 Storage (file processing)
# =============================================================================
[[r2_buckets]]
binding = "FILES"
bucket_name = "integratewise-files-prod"

# =============================================================================
# D1 Database
# =============================================================================
[[d1_databases]]
binding = "DB"
database_name = "integratewise-spine-prod"
database_id = "08d9f306-0f89-435a-8141-45097e3a0769"

# =============================================================================
# Queue Consumer (v3.6 Section 19.7 — receives from loader/connector)
# Handles all 8-stage pipeline processing
# =============================================================================
[[queues.consumers]]
queue = "integratewise-pipeline-process"
max_batch_size = 25
max_batch_timeout = 10

# =============================================================================
# Queue Producers (v3.6 Section 19.7)
# =============================================================================
[[queues.producers]]
binding = "KNOWLEDGE_QUEUE"
queue = "integratewise-knowledge-ingest"

[[queues.producers]]
binding = "ACCELERATOR_QUEUE"
queue = "integratewise-accelerator-trigger"

[[queues.producers]]
binding = "INTELLIGENCE_QUEUE"
queue = "integratewise-intelligence-events"

[[queues.producers]]
binding = "DLQ"
queue = "integratewise-ops-dlq"

# =============================================================================
# Environment Variables
# =============================================================================
[vars]
ENVIRONMENT = "development"

# =============================================================================
# Observability & Monitoring
# =============================================================================
[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1

# =============================================================================
# Staging Environment
# =============================================================================
[env.staging]
name = "integratewise-normalizer-staging"
routes = [
  { pattern = "normalizer-staging.integratewise.ai/*", zone_name = "integratewise.ai" }
]
[env.staging.vars]
ENVIRONMENT = "staging"

# =============================================================================
# Production Environment
# =============================================================================
[env.production]
name = "integratewise-normalizer"
routes = [
  { pattern = "normalizer.integratewise.ai/*", zone_name = "integratewise.ai" }
]
[env.production.vars]
ENVIRONMENT = "production"
