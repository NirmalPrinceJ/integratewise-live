name = "integratewise-normalizer"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Consumes pipeline messages
[[queues.consumers]]
queue = "pipeline.process"
max_batch_size = 10
max_batch_timeout = 30

# Consumes accelerator triggers (recalculation)
[[queues.consumers]]
queue = "accelerator.trigger"
max_batch_size = 10
max_batch_timeout = 30

# Produces to multiple queues
[[queues.producers]]
queue = "pipeline.process"
binding = "PIPELINE_QUEUE"

[[queues.producers]]
queue = "knowledge.ingest"
binding = "KNOWLEDGE_QUEUE"

[[queues.producers]]
queue = "accelerator.trigger"
binding = "ACCELERATOR_QUEUE"

[[queues.producers]]
queue = "intelligence.events"
binding = "INTELLIGENCE_QUEUE"

[[queues.producers]]
queue = "ops.dlq"
binding = "DLQ_QUEUE"

[[queues.producers]]
queue = "signals"
binding = "SIGNAL_QUEUE"

# D1 cache for entity360 edge projection
[[d1_databases]]
binding = "D1"
database_name = "integratewise-spine-cache"
database_id = "placeholder-d1-id"

# KV signal cache for quick metrics retrieval
[[kv_namespaces]]
binding = "SIGNAL_CACHE"
id = "placeholder-signal-kv"

[[kv_namespaces]]
binding = "METRICS"
id = "placeholder-metrics-kv"

# Service binding — ONLY service allowed to call Spine writes
[[services]]
binding = "SPINE"
service = "integratewise-spine-v2"

[vars]
PYTHON_INTELLIGENCE_URL = "https://ai.integratewise.online"
ENABLE_SIGNALS = "true"
ENABLE_PYTHON_ANALYSIS = "true"

[env.staging]
name = "integratewise-normalizer-staging"
