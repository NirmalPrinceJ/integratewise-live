name = "integratewise-views"
main = "src/index.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

# ─── Secrets (managed by Doppler → synced via scripts/sync-doppler-to-workers.sh) ───
# Doppler config: {env}_views  (e.g. prd_views)

[observability]
enabled = true

# D1 Database binding (for cached projections)
[[d1_databases]]
binding = "DB"
database_name = "integratewise-views-prod"
database_id = "08d9f306-0f89-435a-8141-45097e3a0769"

# Service bindings to compose data from multiple services
[[services]]
binding = "PIPELINE"
service = "integratewise-spine-v2"

[[services]]
binding = "STORE"
service = "integratewise-store"

[[services]]
binding = "KNOWLEDGE"
service = "integratewise-knowledge"

[[services]]
binding = "IQ_HUB"
service = "integratewise-iq-hub"

[[services]]
binding = "TENANTS"
service = "integratewise-tenants"

[[services]]
binding = "THINK"
service = "integratewise-think"

# KV for caching
[[kv_namespaces]]
binding = "VIEW_CACHE"
id = "b9d11750d16a4029919377f87e268232"

[env.staging]
name = "integratewise-views-staging"

[env.production]
name = "integratewise-views"
