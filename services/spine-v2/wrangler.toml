name = "integratewise-spine-v2"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# D1 for edge caching of hot reads
[[d1_databases]]
binding = "CACHE_DB"
database_name = "integratewise-spine-cache"
database_id = "placeholder-d1-id"

# KV for hot entity cache
[[kv_namespaces]]
binding = "CACHE"
id = "placeholder-cache-kv"

[env.staging]
name = "integratewise-spine-v2-staging"
