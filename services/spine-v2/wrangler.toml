name = "integratewise-spine-v2"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# D1 for edge caching of hot reads
[[d1_databases]]
binding = "CACHE_DB"
database_name = "integratewise-spine-cache"
database_id = "ed1f534a-df1e-4783-8a74-8d6d70d067ff"

# KV for hot entity cache
[[kv_namespaces]]
binding = "CACHE"
id = "18aa20dfeb304f0ba592d9070964dd31"

[env.staging]
name = "integratewise-spine-v2-staging"

[env.production]
name = "integratewise-spine-v2"
