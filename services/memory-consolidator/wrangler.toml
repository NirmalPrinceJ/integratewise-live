name = "integratewise-memory-consolidator"
main = "src/index.ts"
compatibility_date = "2024-06-10"

# ─── Secrets (managed by Doppler → synced via scripts/sync-doppler-to-workers.sh) ───
# Doppler config: {env}_memory-consolidator  (e.g. prd_memory-consolidator)

# Scheduled triggers for memory consolidation
[triggers]
crons = [
  "0 * * * *",    # Every hour - consolidate recent sessions
  "0 0 * * *",    # Daily at midnight - deep consolidation
  "0 0 * * 0"     # Weekly on Sunday - cross-account patterns
]

# =============================================================================
# D1 Database (Edge cache only - v3.6)
# =============================================================================
# v3.6: D1 is edge cache only. Supabase PostgreSQL is SINGLE SOURCE OF TRUTH
[[d1_databases]]
binding = "DB"
database_name = "integratewise-spine-prod"
database_id = "08d9f306-0f89-435a-8141-45097e3a0769"

# =============================================================================
# Supabase Bindings (v3.6 - SINGLE SOURCE OF TRUTH)
# =============================================================================
# Doppler secrets: SUPABASE_URL, SUPABASE_SERVICE_KEY (synced via scripts/sync-doppler-to-workers.sh)

# KV for consolidation state and locks
[[kv_namespaces]]
binding = "STATE"
id = "d546c00b8ee84d0497e4a4b3ac661db8"

# Durable Object for consolidation coordination
[durable_objects]
bindings = [
  { name = "CONSOLIDATOR", class_name = "MemoryConsolidator" }
]

[[migrations]]
tag = "v1"
new_classes = ["MemoryConsolidator"]

# Service bindings for data access
[[services]]
binding = "IQ_HUB"
service = "integratewise-iq-hub"

[[services]]
binding = "KNOWLEDGE"
service = "integratewise-knowledge"

[[services]]
binding = "TENANTS"
service = "integratewise-tenants"

[[services]]
binding = "THINK"
service = "integratewise-think"

# Queue for processing individual consolidation tasks
[[queues.producers]]
queue = "memory-consolidation-tasks"
binding = "TASKS_QUEUE"

[[queues.consumers]]
queue = "memory-consolidation-tasks"
max_batch_size = 10
max_batch_timeout = 30

# Environment variables
[vars]
ENVIRONMENT = "development"
LOG_LEVEL = "debug"
CONSOLIDATION_BATCH_SIZE = "100"
MIN_SESSIONS_FOR_CONSOLIDATION = "3"
MEMORY_RETENTION_DAYS = "90"

# Staging environment
[env.staging]
name = "integratewise-memory-consolidator-staging"
[env.staging.vars]
ENVIRONMENT = "staging"
LOG_LEVEL = "info"
[[env.staging.d1_databases]]
binding = "DB"
database_name = "integratewise-spine-staging"
database_id = "6a8b5b3c-18c7-4d0e-aa10-20d0b71a1abc"
[[env.staging.kv_namespaces]]
binding = "STATE"
id = "d546c00b8ee84d0497e4a4b3ac661db8"

# Production environment
[env.production]
name = "integratewise-memory-consolidator-production"
[env.production.vars]
ENVIRONMENT = "production"
LOG_LEVEL = "warn"
CONSOLIDATION_BATCH_SIZE = "500"
[[env.production.d1_databases]]
binding = "DB"
database_name = "integratewise-spine-prod"
database_id = "08d9f306-0f89-435a-8141-45097e3a0769"
[[env.production.kv_namespaces]]
binding = "STATE"
id = "d546c00b8ee84d0497e4a4b3ac661db8"
