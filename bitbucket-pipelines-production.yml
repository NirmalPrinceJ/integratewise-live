image: node:20

definitions:
  caches:
    pnpm: .pnpm-store
    turbo: .turbo

  steps:
    - step: &install-and-test
        name: Install Dependencies and Run Tests
        caches:
          - pnpm
          - turbo
        script:
          - corepack enable
          - corepack prepare pnpm@latest --activate
          - pnpm config set store-dir .pnpm-store
          - pnpm install --frozen-lockfile
          - pnpm test:all
          - pnpm test:coverage
        artifacts:
          - coverage/**

    - step: &build
        name: Build Application
        caches:
          - pnpm
          - turbo
        script:
          - corepack enable
          - corepack prepare pnpm@latest --activate
          - pnpm install --frozen-lockfile
          - pnpm build
          - pnpm cf:build
        artifacts:
          - .next/**
          - "**/dist/**"
          - services/**/dist/**

    - step: &deploy-frontend
        name: Deploy Frontend to Cloudflare Pages
        script:
          - corepack enable
          - corepack prepare pnpm@latest --activate
          - pnpm install --frozen-lockfile
          - pnpm cf:deploy
        artifacts:
          - deployment-url.txt

    - step: &deploy-services
        name: Deploy Services to Cloudflare Workers
        script:
          - corepack enable
          - corepack prepare pnpm@latest --activate
          - pnpm install --frozen-lockfile
          # Deploy each service
          - cd services/gateway && pnpm wrangler deploy --env ${ENVIRONMENT}
          - cd ../act && pnpm wrangler deploy --env ${ENVIRONMENT}
          - cd ../think && pnpm wrangler deploy --env ${ENVIRONMENT}
          - cd ../govern && pnpm wrangler deploy --env ${ENVIRONMENT}
          - cd ../normalizer && pnpm wrangler deploy --env ${ENVIRONMENT}
          - cd ../loader && pnpm wrangler deploy --env ${ENVIRONMENT}
          - cd ../store && pnpm wrangler deploy --env ${ENVIRONMENT}
          - cd ../iq-hub && pnpm wrangler deploy --env ${ENVIRONMENT}
          - cd ../knowledge && pnpm wrangler deploy --env ${ENVIRONMENT}
          - cd ../spine-v2 && pnpm wrangler deploy --env ${ENVIRONMENT}
          - cd ../cognitive-brain && pnpm wrangler deploy --env ${ENVIRONMENT}
          - cd ../admin && pnpm wrangler deploy --env ${ENVIRONMENT}
          - cd ../tenants && pnpm wrangler deploy --env ${ENVIRONMENT}
          - cd ../workflow && pnpm wrangler deploy --env ${ENVIRONMENT}
          - cd ../agents && pnpm wrangler deploy --env ${ENVIRONMENT}
          - cd ../billing && pnpm wrangler deploy --env ${ENVIRONMENT}
          - cd ../views && pnpm wrangler deploy --env ${ENVIRONMENT}
          - cd ../stream-gateway && pnpm wrangler deploy --env ${ENVIRONMENT}
          - cd ../memory-consolidator && pnpm wrangler deploy --env ${ENVIRONMENT}
          - cd ../mcp-connector && pnpm wrangler deploy --env ${ENVIRONMENT}

    - step: &health-check-staging
        name: Health Check (Staging)
        script:
          - echo "Waiting 30 seconds for services to stabilize..."
          - sleep 30
          - |
            echo "Checking frontend health..."
            curl -f https://staging.integratewise.ai/health || exit 1

            echo "Checking critical services..."
            services=(
              "https://gateway-staging.integratewise.ai/health"
              "https://think-staging.integratewise.ai/health"
              "https://govern-staging.integratewise.ai/health"
            )

            for service in "${services[@]}"; do
              echo "Checking $service"
              if ! curl -f "$service"; then
                echo "❌ Health check failed for $service"
                exit 1
              fi
              echo "✅ $service is healthy"
            done

            echo "✅ All health checks passed"

    - step: &health-check-production
        name: Health Check (Production)
        script:
          - echo "Waiting 60 seconds for production services to stabilize..."
          - sleep 60
          - |
            echo "Checking frontend health..."
            curl -f https://integratewise.ai/health || exit 1

            echo "Checking critical services..."
            services=(
              "https://gateway.integratewise.ai/health"
              "https://think.integratewise.ai/health"
              "https://govern.integratewise.ai/health"
              "https://spine-v2.integratewise.ai/health"
              "https://iq-hub.integratewise.ai/health"
            )

            for service in "${services[@]}"; do
              echo "Checking $service"
              if ! curl -f "$service"; then
                echo "❌ Health check failed for $service"
                exit 1
              fi
              echo "✅ $service is healthy"
            done

            echo "✅ All production health checks passed"

    - step: &notify-success
        name: Notify Deployment Success
        script:
          - |
            echo "✅ Deployment to ${ENVIRONMENT} completed successfully!"
            echo "Timestamp: $(date)"
            # Add Slack/Discord notification here if needed
            # curl -X POST $SLACK_WEBHOOK -d '{"text":"✅ Deployment successful"}'

pipelines:
  # Development branch - just test and build
  default:
    - step: *install-and-test
    - step: *build

  # Staging branch - auto-deploy to staging
  branches:
    staging:
      - step: *install-and-test
      - step: *build
      - step:
          <<: *deploy-frontend
          deployment: staging
      - step:
          <<: *deploy-services
          deployment: staging
      - step: *health-check-staging
      - step: *notify-success

    # Production branch - requires approval
    main:
      - step: *install-and-test
      - step: *build
      - step:
          <<: *deploy-frontend
          deployment: production
          trigger: manual  # Manual approval required
      - step:
          <<: *deploy-services
          deployment: production
          trigger: manual  # Manual approval required
      - step: *health-check-production
      - step: *notify-success

  # Manual deployment options
  custom:
    deploy-staging-manual:
      - variables:
          - name: ENVIRONMENT
            default: staging
      - step: *build
      - step:
          <<: *deploy-frontend
          deployment: staging
      - step:
          <<: *deploy-services
          deployment: staging
      - step: *health-check-staging

    deploy-production-manual:
      - variables:
          - name: ENVIRONMENT
            default: production
      - step: *build
      - step:
          <<: *deploy-frontend
          deployment: production
      - step:
          <<: *deploy-services
          deployment: production
      - step: *health-check-production

    hotfix-production:
      - variables:
          - name: SERVICE_NAME
            default: gateway
      - step:
          name: Deploy Single Service (Hotfix)
          deployment: production
          script:
            - corepack enable
            - corepack prepare pnpm@latest --activate
            - pnpm install --frozen-lockfile
            - cd services/$SERVICE_NAME
            - pnpm wrangler deploy --env production
            - echo "⚠️ Hotfix deployed for $SERVICE_NAME"
