# IntegrateWise Knowledge Bank - Spine Schema (V11.11)
# The Spine is the SINGLE SOURCE OF TRUTH for all verified, normalized data.

# Organization table
type Organization @table(name: "spine_organizations") {
  id: UUID! @default(expr: "uuidV4()")
  workspaceId: String! @col(dataType: "varchar(100)")
  
  # Identity
  name: String! @col(dataType: "varchar(255)")
  domain: String @col(dataType: "varchar(255)")
  legalName: String @col(dataType: "varchar(255)")
  
  # Classification
  industry: String @col(dataType: "varchar(100)")
  segment: String @col(dataType: "varchar(50)") # 'enterprise' | 'mid_market' | 'smb' | 'startup'
  region: String @col(dataType: "varchar(100)")
  
  # Financials
  arr: Float
  mrr: Float
  contractValue: Float
  currency: String @col(dataType: "varchar(10)")
  
  # Size
  employeeCount: Int
  licenseCount: Int
  activeUsers: Int
  
  # Health & Status
  healthScore: Int # 0-100
  healthStatus: String @col(dataType: "varchar(50)") # 'champion' | 'healthy' | 'at_risk' | 'critical'
  lifecycleStage: String @col(dataType: "varchar(50)") # 'prospect' | 'onboarding' | 'active' | 'at_risk' | 'churned'
  
  # Technical
  technicalScore: Int
  mulesoftOrgId: String @col(dataType: "varchar(100)")
  
  # Dates
  customerSince: Date
  renewalDate: Date
  lastQbrDate: Date
  nextQbrDate: Date
  churnDate: Date
  
  # Ownership
  primaryCsmId: String @col(dataType: "varchar(100)")
  primaryTamId: String @col(dataType: "varchar(100)")
  salesOwnerId: String @col(dataType: "varchar(100)")
  supportLeadId: String @col(dataType: "varchar(100)")
  
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# Person table
type Person @table(name: "spine_persons") {
  id: UUID! @default(expr: "uuidV4()")
  workspaceId: String! @col(dataType: "varchar(100)")
  
  # Identity
  firstName: String @col(dataType: "varchar(100)")
  lastName: String @col(dataType: "varchar(100)")
  fullName: String @col(dataType: "varchar(200)")
  
  # Contact
  email: String @col(dataType: "varchar(255)")
  phone: String @col(dataType: "varchar(50)")
  linkedinUrl: String @col(dataType: "text")
  
  # Internal linkage
  userId: String @col(dataType: "varchar(100)")
  isInternal: Boolean! @default(value: false)
  
  # Organization relationship
  organization: Organization
  
  # Professional
  jobTitle: String @col(dataType: "varchar(200)")
  department: String @col(dataType: "varchar(100)")
  seniority: String @col(dataType: "varchar(50)") # 'c_level' | 'vp' | 'director' | 'manager' | 'individual_contributor'
  
  # Relationship
  roleType: String @col(dataType: "varchar(50)") # 'champion' | 'decision_maker' | 'influencer' | 'user' | 'blocker' | 'economic_buyer'
  relationshipStrength: Int # 1-10
  lastContactedAt: Timestamp
  
  # Internal team
  team: String @col(dataType: "varchar(50)") # 'cs' | 'tam' | 'sales' | 'support' | 'accounts' | 'proserv'
  teamRole: String @col(dataType: "varchar(100)")
  
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# Deal table
type Deal @table(name: "spine_deals") {
  id: UUID! @default(expr: "uuidV4()")
  workspaceId: String! @col(dataType: "varchar(100)")
  organization: Organization!
  
  # Deal info
  name: String! @col(dataType: "varchar(255)")
  stage: String! @col(dataType: "varchar(50)") # 'discovery' | 'qualification' | 'proposal' | 'negotiation' | 'closed_won' | 'closed_lost'
  
  # Value
  amount: Float
  currency: String @col(dataType: "varchar(10)")
  probability: Float
  
  # Dates
  expectedCloseDate: Date
  actualCloseDate: Date
  
  # Ownership
  ownerId: String @col(dataType: "varchar(100)")
  
  # Type
  dealType: String @col(dataType: "varchar(50)") # 'new_business' | 'expansion' | 'renewal' | 'upsell'
  
  notes: String @col(dataType: "text")
  
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# Ticket table
type Ticket @table(name: "spine_tickets") {
  id: UUID! @default(expr: "uuidV4()")
  workspaceId: String! @col(dataType: "varchar(100)")
  organization: Organization
  contact: Person
  
  # Ticket info
  subject: String! @col(dataType: "varchar(255)")
  description: String @col(dataType: "text")
  status: String! @col(dataType: "varchar(50)") # 'open' | 'pending' | 'in_progress' | 'resolved' | 'closed'
  priority: String! @col(dataType: "varchar(50)") # 'low' | 'medium' | 'high' | 'urgent'
  
  # Classification
  category: String @col(dataType: "varchar(100)")
  subcategory: String @col(dataType: "varchar(100)")
  
  # Assignment
  assignedTo: String @col(dataType: "varchar(100)")
  
  # SLA
  slaDueAt: Timestamp
  slaBreached: Boolean @default(value: false)
  
  # Resolution
  resolvedAt: Timestamp
  resolutionNotes: String @col(dataType: "text")
  satisfactionScore: Int # 1-5
  
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# Event table
type Event @table(name: "spine_events") {
  id: UUID! @default(expr: "uuidV4()")
  workspaceId: String! @col(dataType: "varchar(100)")
  organization: Organization
  
  # Event info
  eventType: String! @col(dataType: "varchar(50)") # 'call' | 'meeting' | 'email' | 'note' | 'task' | 'qbr' | 'ebr'
  subject: String @col(dataType: "varchar(255)")
  description: String @col(dataType: "text")
  
  # Timing
  occurredAt: Timestamp!
  durationMinutes: Int
  
  # Related entities
  deal: Deal
  ticket: Ticket
  
  # Actor
  createdBy: String @col(dataType: "varchar(100)")
  
  createdAt: Timestamp! @default(expr: "request.time")
}

# Metric table
type Metric @table(name: "spine_metrics") {
  id: UUID! @default(expr: "uuidV4()")
  workspaceId: String! @col(dataType: "varchar(100)")
  organization: Organization
  
  # Metric info
  metricType: String! @col(dataType: "varchar(50)") # 'adoption' | 'usage' | 'engagement' | 'nps' | 'csat' | 'api_calls'
  metricName: String! @col(dataType: "varchar(100)")
  metricValue: Float!
  metricUnit: String @col(dataType: "varchar(20)")
  
  # Time
  measuredAt: Timestamp!
  period: String @col(dataType: "varchar(50)") # 'hourly' | 'daily' | 'weekly' | 'monthly'
  
  createdAt: Timestamp! @default(expr: "request.time")
}

# Document table
type Document @table(name: "spine_documents") {
  id: UUID! @default(expr: "uuidV4()")
  workspaceId: String! @col(dataType: "varchar(100)")
  organization: Organization
  
  # Document info
  title: String! @col(dataType: "varchar(255)")
  documentType: String @col(dataType: "varchar(100)") # 'contract' | 'sow' | 'proposal' | 'qbr_deck' | 'technical_doc' | 'support_doc'
  description: String @col(dataType: "text")
  
  # Storage
  fileUrl: String @col(dataType: "text")
  fileSize: Int
  mimeType: String @col(dataType: "varchar(100)")
  
  # Version
  version: String @col(dataType: "varchar(50)")
  isCurrent: Boolean @default(value: true)
  
  # Dates
  effectiveDate: Date
  expiryDate: Date
  
  # Search
  contentText: String @col(dataType: "text")
  
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}
