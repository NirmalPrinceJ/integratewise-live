# Organizations
query ListOrganizations($workspaceId: String!) @auth(level: PUBLIC) {
  organizations(where: { workspaceId: { eq: $workspaceId } }) {
    id
    name
    domain
    industry
    healthScore
    healthStatus
    lifecycleStage
    arr
  }
}

query GetOrganizationDetails($id: UUID!) @auth(level: PUBLIC) {
  organization(id: $id) {
    id
    name
    domain
    legalName
    industry
    segment
    region
    arr
    mrr
    contractValue
    currency
    employeeCount
    licenseCount
    activeUsers
    healthScore
    healthStatus
    lifecycleStage
    technicalScore
    mulesoftOrgId
    customerSince
    renewalDate
    lastQbrDate
    nextQbrDate
    createdAt
    updatedAt
    
    # Related entities
    persons_on_organization {
      id
      fullName
      jobTitle
      roleType
    }
    deals_on_organization {
      id
      name
      stage
      amount
    }
    tickets_on_organization(limit: 5) {
      id
      subject
      status
      priority
    }
  }
}

# Persons
query ListPersons($workspaceId: String!) @auth(level: PUBLIC) {
  persons(where: { workspaceId: { eq: $workspaceId } }) {
    id
    fullName
    email
    jobTitle
    roleType
    organization {
      name
    }
  }
}

# Search (Basic simulation)
query SearchOrganizations($name: String!) @auth(level: PUBLIC) {
  organizations(where: { name: { contains: $name } }) {
    id
    name
    healthStatus
  }
}
