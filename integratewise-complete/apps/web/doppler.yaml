# Doppler Configuration for IntegrateWise Web App
# This file configures Doppler for the Next.js web application

# Project name in Doppler
project: integratewise

# Config mapping for different environments
# Maps local environment to Doppler config
setup:
  - project: integratewise
    config: dev_web
    path: .
    
# Environment variable substitution
# These values will be injected by Doppler at runtime
