name = "integratewise-normalizer"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8005
local_protocol = "http"

[env.production]
name = "integratewise-normalizer"
routes = [
  { pattern = "normalizer.integratewise.ai/*", zone_name = "integratewise.ai" }
]

[vars]
ENVIRONMENT = "production"
SPINE_SERVICE_URL = "https://store.integratewise.ai"
KNOWLEDGE_SERVICE_URL = "https://knowledge.integratewise.ai"

[[r2_buckets]]
binding = "FILES"
bucket_name = "integratewise-files-prod"

[[d1_databases]]
binding = "DB"
database_name = "integratewise-spine-prod"
database_id = "08d9f306-0f89-435a-8141-45097e3a0769"

[env.staging]
name = "integratewise-normalizer-staging"
routes = [
  { pattern = "normalizer-staging.integratewise.ai/*", zone_name = "integratewise.ai" }
]
vars = { ENVIRONMENT = "staging", SPINE_SERVICE_URL = "https://store-staging.integratewise.ai", KNOWLEDGE_SERVICE_URL = "https://knowledge-staging.integratewise.ai" }

[env.development]
vars = { ENVIRONMENT = "development", SPINE_SERVICE_URL = "http://localhost:8007", KNOWLEDGE_SERVICE_URL = "http://localhost:8785" }

# ============================================================================
# Observability & Monitoring
# ============================================================================
[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1

# ============================================================================
# Alerting (configured in Cloudflare Dashboard)
# ============================================================================
