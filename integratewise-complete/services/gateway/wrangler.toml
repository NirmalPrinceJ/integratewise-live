name = "integratewise-gateway"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8001
local_protocol = "http"

[env.production]
name = "integratewise-gateway"
routes = [
	{ pattern = "gateway.integratewise.ai/*", zone_name = "integratewise.ai" }
]

[env.staging]
name = "integratewise-gateway-staging"
vars = { ENVIRONMENT = "staging" }
routes = [
	{ pattern = "gateway-staging.integratewise.ai/*", zone_name = "integratewise.ai" }
]

# ============================================================================
# Observability & Monitoring
# ============================================================================
[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1


# ============================================================================
# Alerting (configured in Cloudflare Dashboard)
# - High error rate (>5% 5xx responses)
# - High latency (>2s p95 response time)
# - High CPU usage (>80% sustained)
# - Function cold starts (>100/minute)
# ============================================================================
