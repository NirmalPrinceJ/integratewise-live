name = "integratewise-views"
main = "src/index.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# D1 Database binding (for cached projections)
[[d1_databases]]
binding = "DB"
database_name = "integratewise-views-prod"
database_id = "placeholder-will-be-created"

# Service bindings to compose data from multiple services
[services]
SPINE = { service = "integratewise-spine" }
STORE = { service = "integratewise-store" }
KNOWLEDGE = { service = "integratewise-knowledge" }
IQ_HUB = { service = "integratewise-iq-hub" }
TENANTS = { service = "integratewise-tenants" }
THINK = { service = "integratewise-think" }

# KV for caching
[[kv_namespaces]]
binding = "VIEW_CACHE"
id = "placeholder-will-be-created"

[env.staging]
name = "integratewise-views-staging"

[env.production]
name = "integratewise-views"
