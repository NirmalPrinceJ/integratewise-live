name = "integratewise-memory-consolidator"
main = "src/index.ts"
compatibility_date = "2024-06-10"

# Scheduled triggers for memory consolidation
[triggers]
crons = [
  "0 * * * *",    # Every hour - consolidate recent sessions
  "0 0 * * *",    # Daily at midnight - deep consolidation
  "0 0 * * 0"     # Weekly on Sunday - cross-account patterns
]

# D1 database for consolidated memories
[[d1_databases]]
binding = "DB"
database_name = "integratewise-memory-consolidator"
database_id = "placeholder-memory-consolidator-db-id"

# KV for consolidation state and locks
[[kv_namespaces]]
binding = "STATE"
id = "placeholder-memory-state-kv-id"

# Durable Object for consolidation coordination
[durable_objects]
bindings = [
  { name = "CONSOLIDATOR", class_name = "MemoryConsolidator" }
]

[[migrations]]
tag = "v1"
new_classes = ["MemoryConsolidator"]

# Service bindings for data access
[[services]]
binding = "IQ_HUB"
service = "integratewise-iq-hub"

[[services]]
binding = "KNOWLEDGE"
service = "integratewise-knowledge"

[[services]]
binding = "TENANTS"
service = "integratewise-tenants"

[[services]]
binding = "THINK"
service = "integratewise-think"

# Queue for processing individual consolidation tasks
[[queues.producers]]
queue = "memory-consolidation-tasks"
binding = "TASKS_QUEUE"

[[queues.consumers]]
queue = "memory-consolidation-tasks"
max_batch_size = 10
max_batch_timeout = 30

# Environment variables
[vars]
ENVIRONMENT = "development"
LOG_LEVEL = "debug"
CONSOLIDATION_BATCH_SIZE = "100"
MIN_SESSIONS_FOR_CONSOLIDATION = "3"
MEMORY_RETENTION_DAYS = "90"

# Staging environment
[env.staging]
name = "integratewise-memory-consolidator-staging"
[env.staging.vars]
ENVIRONMENT = "staging"
LOG_LEVEL = "info"
[[env.staging.d1_databases]]
binding = "DB"
database_name = "integratewise-memory-consolidator-staging"
database_id = "placeholder-staging-db-id"
[[env.staging.kv_namespaces]]
binding = "STATE"
id = "placeholder-staging-kv-id"

# Production environment
[env.production]
name = "integratewise-memory-consolidator-production"
[env.production.vars]
ENVIRONMENT = "production"
LOG_LEVEL = "warn"
CONSOLIDATION_BATCH_SIZE = "500"
[[env.production.d1_databases]]
binding = "DB"
database_name = "integratewise-memory-consolidator-production"
database_id = "placeholder-production-db-id"
[[env.production.kv_namespaces]]
binding = "STATE"
id = "placeholder-production-kv-id"
