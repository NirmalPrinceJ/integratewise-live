name = "integratewise-cognitive-brain"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8010
local_protocol = "http"

[env.production]
name = "integratewise-cognitive-brain"
routes = [
  { pattern = "cognitive.integratewise.ai/*", zone_name = "integratewise.ai" }
]

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "integratewise-spine-prod"
database_id = "08d9f306-0f89-435a-8141-45097e3a0769"

[env.staging]
name = "integratewise-cognitive-brain-staging"
routes = [
  { pattern = "cognitive-staging.integratewise.ai/*", zone_name = "integratewise.ai" }
]
vars = { ENVIRONMENT = "staging" }

[env.development]
vars = { ENVIRONMENT = "development" }

# ============================================================================
# Observability & Monitoring
# ============================================================================
[observability]
enabled = true
