name = "integratewise-store"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8007
local_protocol = "http"

[env.production]
name = "integratewise-store"
routes = [
  { pattern = "store.integratewise.ai/*", zone_name = "integratewise.ai" }
]

[vars]
ENVIRONMENT = "production"
KNOWLEDGE_SERVICE_URL = "https://knowledge.integratewise.ai"

[[d1_databases]]
binding = "DB"
database_name = "integratewise-spine-prod"
database_id = "08d9f306-0f89-435a-8141-45097e3a0769"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "integratewise-files-prod"

[env.staging]
name = "integratewise-store-staging"
routes = [
  { pattern = "store-staging.integratewise.ai/*", zone_name = "integratewise.ai" }
]
vars = { ENVIRONMENT = "staging", KNOWLEDGE_SERVICE_URL = "https://knowledge-staging.integratewise.ai" }

[env.development]
vars = { ENVIRONMENT = "development", KNOWLEDGE_SERVICE_URL = "http://localhost:8010" }

# ============================================================================
# Observability & Monitoring
# ============================================================================
[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1

# ============================================================================
# Alerting (configured in Cloudflare Dashboard)
# ============================================================================
