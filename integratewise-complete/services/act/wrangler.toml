name = "integratewise-act"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8002
local_protocol = "http"

[env.production]
name = "integratewise-act"
routes = [
  { pattern = "act.integratewise.ai/*", zone_name = "integratewise.ai" }
]
vars = { ENVIRONMENT = "production", STORE_URL = "https://store.integratewise.ai", THINK_URL = "https://think.integratewise.ai", GOVERN_URL = "https://govern.integratewise.ai" }

[[d1_databases]]
binding = "DB"
database_name = "integratewise-spine-prod"
database_id = "08d9f306-0f89-435a-8141-45097e3a0769"

[[services]]
binding = "GOVERN"
service = "integratewise-govern"

[env.staging]
name = "integratewise-act-staging"
routes = [
  { pattern = "act-staging.integratewise.ai/*", zone_name = "integratewise.ai" }
]
vars = { ENVIRONMENT = "staging", STORE_URL = "https://store-staging.integratewise.ai", THINK_URL = "https://think-staging.integratewise.ai", GOVERN_URL = "https://govern-staging.integratewise.ai" }

[env.development]
vars = { ENVIRONMENT = "development", STORE_URL = "http://localhost:8007", THINK_URL = "http://localhost:8003", GOVERN_URL = "http://localhost:8004" }

# ============================================================================
# Observability & Monitoring
# ============================================================================
[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1

# ============================================================================
# Alerting (configured in Cloudflare Dashboard)
# ============================================================================
