name = "integratewise-stream-gateway"
main = "src/index.ts"
compatibility_date = "2024-06-10"
compatibility_flags = ["nodejs_compat"]

# =============================================================================
# Durable Objects for Real-time Connections
# =============================================================================
[durable_objects]
bindings = [
  { name = "SIGNAL_STREAM", class_name = "SignalStreamDO" },
  { name = "PRESENCE", class_name = "PresenceDO" },
  { name = "ROOM", class_name = "RoomDO" }
]

[[migrations]]
tag = "v1"
new_classes = ["SignalStreamDO", "PresenceDO", "RoomDO"]

# =============================================================================
# KV for connection metadata and rate limiting
# =============================================================================
[[kv_namespaces]]
binding = "CONNECTION_META"
id = "placeholder-connection-meta-kv-id"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "placeholder-rate-limit-kv-id"

# =============================================================================
# Service Bindings
# =============================================================================
[[services]]
binding = "THINK"
service = "integratewise-think"

[[services]]
binding = "TENANTS"
service = "integratewise-tenants"

[[services]]
binding = "IQ_HUB"
service = "integratewise-iq-hub"

# =============================================================================
# Environment Variables
# =============================================================================
[vars]
ENVIRONMENT = "development"
LOG_LEVEL = "debug"
MAX_CONNECTIONS_PER_TENANT = "1000"
MAX_CONNECTIONS_PER_USER = "10"
HEARTBEAT_INTERVAL_MS = "30000"
CONNECTION_TIMEOUT_MS = "300000"

# =============================================================================
# Staging Environment
# =============================================================================
[env.staging]
name = "integratewise-stream-gateway-staging"
[env.staging.vars]
ENVIRONMENT = "staging"
LOG_LEVEL = "info"
[[env.staging.kv_namespaces]]
binding = "CONNECTION_META"
id = "placeholder-staging-connection-meta-kv-id"
[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT"
id = "placeholder-staging-rate-limit-kv-id"

# =============================================================================
# Production Environment
# =============================================================================
[env.production]
name = "integratewise-stream-gateway-production"
routes = [
  { pattern = "stream.integratewise.ai/*", zone_name = "integratewise.ai" }
]
[env.production.vars]
ENVIRONMENT = "production"
LOG_LEVEL = "warn"
MAX_CONNECTIONS_PER_TENANT = "10000"
MAX_CONNECTIONS_PER_USER = "50"
[[env.production.kv_namespaces]]
binding = "CONNECTION_META"
id = "placeholder-production-connection-meta-kv-id"
[[env.production.kv_namespaces]]
binding = "RATE_LIMIT"
id = "placeholder-production-rate-limit-kv-id"
