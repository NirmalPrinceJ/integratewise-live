name = "integratewise-spine-v2"
main = "src/index.ts"
compatibility_date = "2026-01-31"
compatibility_flags = ["nodejs_compat"]

[vars]
NODE_ENV = "development"
VERSION = "2.0.0-beta"

# Secrets (set via wrangler secret put):
# - NEON_DB_URL
# - SUPABASE_URL
# - SUPABASE_ANON_KEY

# Development
[env.development]
vars = { NODE_ENV = "development" }

# Staging
[env.staging]
name = "integratewise-spine-v2-staging"
vars = { NODE_ENV = "staging" }

# Production
[env.production]
name = "integratewise-spine-v2"
vars = { NODE_ENV = "production" }
routes = [
  { pattern = "api.integratewise.ai/v2/spine/*", zone_name = "integratewise.ai" }
]

# D1 Database (for caching)
[[d1_databases]]
binding = "CACHE"
database_name = "integratewise-spine-cache"
database_id = "ed1f534a-df1e-4783-8a74-8d6d70d067ff"

# KV Storage
[[kv_namespaces]]
binding = "KV"
id = "18aa20dfeb304f0ba592d9070964dd31"

# Analytics (disabled - requires enablement in dashboard)
# [[analytics_engine_datasets]]
# binding = "ANALYTICS"
