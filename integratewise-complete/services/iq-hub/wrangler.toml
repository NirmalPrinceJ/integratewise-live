name = "integratewise-iq-hub"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "integratewise-iq-hub"
routes = [
  { pattern = "iq-hub.integratewise.ai/*", zone_name = "integratewise.ai" }
]
vars = { ENVIRONMENT = "production", ACT_URL = "https://act.integratewise.ai", THINK_URL = "https://think.integratewise.ai", STORE_URL = "https://store.integratewise.ai" }

[[d1_databases]]
binding = "DB"
database_name = "integratewise-spine-prod"
database_id = "08d9f306-0f89-435a-8141-45097e3a0769"

[env.staging]
name = "integratewise-iq-hub-staging"
routes = [
  { pattern = "iq-hub-staging.integratewise.ai/*", zone_name = "integratewise.ai" }
]
vars = { ENVIRONMENT = "staging", ACT_URL = "https://act-staging.integratewise.ai", THINK_URL = "https://think-staging.integratewise.ai", STORE_URL = "https://store-staging.integratewise.ai" }

# ============================================================================
# Observability & Monitoring
# ============================================================================
[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1


# ============================================================================
# Alerting (configured in Cloudflare Dashboard)
# - High error rate (>5% 5xx responses)
# - High latency (>2s p95 response time)
# - High CPU usage (>80% sustained)
# - Function cold starts (>100/minute)
# ============================================================================
