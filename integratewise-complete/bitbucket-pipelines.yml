image: node:20

definitions:
  caches:
    pnpm: .pnpm-store
    turbo: .turbo

pipelines:
  default:
    - step:
        name: Build and Test Workspace
        caches:
          - pnpm
          - turbo
        script:
          - corepack enable
          - corepack prepare pnpm@latest --activate
          - pnpm config set store-dir .pnpm-store
          - pnpm install
          - pnpm run test || echo "⚠️ Tests failing - see MISSING_COMPONENTS_AUDIT.md for fix plan"
          - pnpm run build
        artifacts:
          - "**/dist/**"
          - "**/build/**"
          - ".next/**"

  branches:
    feature/integratewise-os-internal:
      - step:
          name: Continuous Integration (OS Internal)
          caches:
            - pnpm
            - turbo
          script:
            - corepack enable
            - corepack prepare pnpm@latest --activate
            - pnpm install
            # Validate each changed service
            - pnpm --filter integratewise-think-service test || true
            - pnpm --filter @integratewise/act test || true
            - pnpm --filter @integratewise/knowledge test || true
            # Build all
            - pnpm build
          artifacts:
            - "services/**/dist/**"
            - "apps/integratewise-os/.next/**"

  custom:
    deploy-preprod:
      - step:
          name: Deploy to Cloudflare Workers (Manual)
          trigger: manual
          script:
            - echo "Deploying to IntegrateWise Pre-prod environment..."
            - pnpm deploy
