# IntegrateWise Service - Cloudflare Worker Configuration
# Template: Copy this file to services/{name}/wrangler.toml

name = "integratewise-{name}-service"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Environment variables (secrets should use wrangler secret)
[vars]
ENVIRONMENT = "development"

# Production environment
[env.production]
name = "integratewise-{name}-service-prod"
[env.production.vars]
ENVIRONMENT = "production"

# Staging environment  
[env.staging]
name = "integratewise-{name}-service-staging"
[env.staging.vars]
ENVIRONMENT = "staging"

# D1 Database (if needed)
# [[d1_databases]]
# binding = "DB"
# database_name = "integratewise-{name}"
# database_id = "your-database-id"

# R2 Bucket (if needed)
# [[r2_buckets]]
# binding = "FILES"
# bucket_name = "integratewise-{name}-files"

# KV Namespace (if needed)
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"

# Queue (if needed)
# [[queues.producers]]
# binding = "QUEUE"
# queue = "integratewise-{name}-queue"

# Service bindings (if calling other services)
# [[services]]
# binding = "SPINE_SERVICE"
# service = "integratewise-spine-v2"
